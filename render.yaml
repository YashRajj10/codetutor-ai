services:
  - type: web
    name: codetutor-ai
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      apt-get install -y tesseract-ocr || true
      pip install -r requirements.txt
      python db_init.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
    plan: free
